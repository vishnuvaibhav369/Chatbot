<!DOCTYPE html>
<html>
<head>
  <title>SRM Buddy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e8e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 16px;
    }

    .logo-wrap img {
      height: 90px;
      width: auto;
      border-radius: 12px;
    }

    .top {
      text-align: center;
      margin-bottom: 18px;
    }

    .top h1 {
      font-size: 24px;
      color: #5c35d4;
      margin-bottom: 4px;
    }

    .top p {
      font-size: 13px;
      color: #888;
    }

    .box {
      background: #fff;
      border-radius: 18px;
      border: 2px solid #d4c9ff;
      padding: 18px;
      width: 100%;
      max-width: 560px;
    }

    .chatbox {
      height: 350px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .chatbox::-webkit-scrollbar { width: 4px; }
    .chatbox::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 4px;
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
    }

    .bubble-wrap.me { align-items: flex-end; }
    .bubble-wrap.bot { align-items: flex-start; }

    .who {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
      padding: 0 6px;
    }

    .bubble {
      padding: 9px 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 85%;
    }

    .bubble.me {
      background: #7c4dff;
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }

    .bubble.bot {
      background: #f0edff;
      color: #333;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid #d4c9ff;
    }

    .pills {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .pill {
      background: #f0edff;
      color: #7c4dff;
      border: 1.5px solid #c4b5fd;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .pill:hover { background: #e0d9ff; }

    .row {
      display: flex;
      gap: 8px;
    }

    .row input {
      flex: 1;
      background: #f9f7ff;
      border: 1.5px solid #d4c9ff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      color: #333;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .row input::placeholder { color: #bbb; }
    .row input:focus { border-color: #7c4dff; }

    .row button {
      background: #7c4dff;
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .row button:hover { background: #6a3de8; }
    .row button:active { transform: scale(0.95); }

    .row button svg {
      fill: white;
      width: 18px;
      height: 18px;
    }
  </style>
</head>

    function addMsg(text, who) {

      b.innerHTML = text;

      w.appendChild(lbl);
      w.appendChild(b);
      box.appendChild(w);
      box.scrollTop = box.scrollHeight;
    }
